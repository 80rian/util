<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>util.80rian.com</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F2EDE4;
      --surface: #FFFFFF;
      --ink: #111111;
      --ink-mid: #555550;
      --ink-light: #999990;
      --border: #111111;
      --border-light: #D5D0C8;
      --accent: #E8430A;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    .header {
      border-bottom: 3px solid var(--ink);
      padding-bottom: 1rem;
      margin-bottom: 3rem;
    }
    .header h1 {
      font-family: var(--font-display);
      font-size: 3.2rem;
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.03em;
    }
    .header p {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--ink-light);
      margin-top: 0.5rem;
      letter-spacing: 0.04em;
    }

    .utils {
      list-style: none;
    }
    .utils li {
      border-bottom: 1.5px solid var(--border-light);
    }
    .utils a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 0;
      text-decoration: none;
      color: var(--ink);
      transition: padding-left 0.2s;
    }
    .utils a:hover {
      padding-left: 0.5rem;
    }
    .utils a:hover .util-name {
      color: var(--accent);
    }
    .util-name {
      font-weight: 600;
      font-size: 1.05rem;
      transition: color 0.15s;
    }
    .util-desc {
      font-size: 0.78rem;
      color: var(--ink-light);
      margin-top: 0.15rem;
    }
    .util-arrow {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--ink-light);
      transition: transform 0.2s, color 0.2s;
    }
    .utils a:hover .util-arrow {
      transform: translateX(4px);
      color: var(--accent);
    }

    .footer {
      margin-top: 4rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--ink-light);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>UTIL</h1>
      <p>util.80rian.com</p>
    </header>

    <ul class="utils">
      <li>
        <a href="/reels-cover/">
          <div>
            <div class="util-name">Reels Cover Generator</div>
            <div class="util-desc">Instagram Reels cover image generator with style presets</div>
          </div>
          <span class="util-arrow">→</span>
        </a>
      </li>
    </ul>

    <div class="footer">80rian</div>
  </div>
</body>
</html>
